---
# tasks file for minecraft

- name: create minecraft user
  ansible.builtin.user:
    name: minecraft
    comment: Minecraft User
    shell: /bin/bash
    home: "{{ minecraft_home }}"

- name: install required packages
  ansible.builtin.dnf:
    name:
      - java-latest-openjdk-headless
      - screen
    state: latest

# EOF
